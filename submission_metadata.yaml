ai_usage_summary: |
  Used Claude to help with code review and to discuss the scoring approach.
  The scoring logic and weights came from reading the JD carefully and
  iterating on what actually made sense. No candidate data was sent to any API.
  The rank.py file makes zero external calls.

methodology_summary: |
  Rule-based multi-signal scorer. The main insight was that the JD explicitly
  warns against keyword matching — a Marketing Manager with AI skills is not
  a fit. So the title/career trajectory is the primary signal (35%), followed
  by skill depth with a duration trust check (25%), experience fit including
  production deployment signals (20%), location (10%), and a behavioral
  multiplier based on activity/response signals (0.2-1.3x). Honeypots
  caught by checking skill duration consistency and career timeline math.
  Runs in ~65 seconds on CPU for 100K candidates.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
